<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#315c47">
  <title>Meal Builder</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Simple meal decisions</p>
      <h1>Meal Builder</h1>
    </div>
    <button id="manageCategoriesBtn" class="secondary small">Manage</button>
  </header>

  <main>
    <section class="meal-summary card">
      <div class="summary-heading">
        <div class="summary-content">
          <p class="label">Current combination</p>
          <div id="currentMeal" class="meal-chips" aria-live="polite">
            <p class="empty-meal">Nothing selected yet</p>
          </div>
        </div>
        <button id="clearMealBtn" class="text-button">Clear</button>
      </div>
      <div class="summary-actions">
        <button id="saveMealBtn" class="primary">Save combination</button>
        <button id="savedMealsBtn" class="secondary">Saved combinations</button>
      </div>
    </section>

    <section>
      <div class="section-heading">
        <h2>Categories</h2>
      </div>
      <div id="categoryList" class="category-grid"></div>
    </section>
  </main>

  <dialog id="categoryDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <div>
          <p class="label">Choose one or more</p>
          <h2 id="categoryDialogTitle">Category</h2>
        </div>
        <button value="cancel" class="icon-button" aria-label="Close">×</button>
      </div>
      <div id="itemChoiceList" class="choice-list"></div>
      <div class="dialog-actions">
        <button value="done" class="primary">Done</button>
      </div>
    </form>
  </dialog>


  <dialog id="manageMenuDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <h2>Manage</h2>
        <button value="cancel" class="icon-button" aria-label="Close">×</button>
      </div>

      <div class="manage-menu">
        <button type="button" id="manageCategoriesMenuBtn" class="menu-card">
          <strong>Categories</strong>
          <span>Add, rename, reorder, or delete categories</span>
        </button>

        <button type="button" id="manageItemsMenuBtn" class="menu-card">
          <strong>Items</strong>
          <span>Add, rename, reorder, or delete items</span>
        </button>

        <div class="menu-card static">
          <strong>Backup</strong>
          <span>Export or restore your categories and saved combinations</span>
          <div class="utility-actions">
            <button type="button" id="exportBtn" class="secondary">Export backup</button>
            <label class="secondary file-button">
              Import backup
              <input id="importInput" type="file" accept="application/json">
            </label>
          </div>
        </div>
      </div>
    </form>
  </dialog>

  <dialog id="categoryPickerDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <h2>Choose a category</h2>
        <button value="cancel" class="icon-button" aria-label="Close">×</button>
      </div>
      <div id="categoryPickerList" class="manage-menu"></div>
    </form>
  </dialog>

  <dialog id="manageDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <h2 id="manageDialogTitle">Manage</h2>
        <button value="cancel" class="icon-button" aria-label="Close">×</button>
      </div>
      <div id="manageList" class="manage-list"></div>
      <button type="button" id="addManagedItemBtn" class="secondary full">+ Add</button>
      <div class="dialog-actions">
        <button value="done" class="primary">Done</button>
      </div>
    </form>
  </dialog>

  <dialog id="savedDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <h2>Saved combinations</h2>
        <button value="cancel" class="icon-button" aria-label="Close">×</button>
      </div>
      <div id="savedMealList" class="saved-list"></div>
      <div class="dialog-actions">
        <button value="done" class="primary">Done</button>
      </div>
    </form>
  </dialog>

  <dialog id="promptDialog">
    <form method="dialog" class="dialog-card compact" id="promptForm">
      <h2 id="promptTitle">Enter a name</h2>
      <label>
        <span id="promptLabel">Name</span>
        <input id="promptInput" type="text" autocomplete="off" required>
      </label>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">Cancel</button>
        <button value="confirm" class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="app.js?v=3"></script>
</body>
</html>
